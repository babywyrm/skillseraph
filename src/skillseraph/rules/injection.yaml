# Prompt injection detection rules
category: injection
rules:
  - id: prompt_injection_override
    pattern: 'ignore\s+(all\s+)?previous\s+instructions'
    severity: critical
    title: "Instruction override: attempts to reset agent context"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: persona_hijack
    pattern: 'you\s+are\s+now\s+(a|an)\s+'
    severity: high
    title: "Persona hijack: redefines agent identity"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: fake_role_claim
    pattern: '(system|assistant)\s*:\s*'
    severity: high
    title: "Fake role marker: mimics system/assistant message boundary"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: safety_override
    pattern: 'do\s+not\s+follow\s+(any|your)\s+(safety|security|previous)'
    severity: critical
    title: "Safety override: instructs agent to ignore safety guidelines"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: jailbreak_language
    pattern: '(jailbreak|DAN|do\s+anything\s+now)'
    severity: critical
    title: "Jailbreak pattern: known alignment bypass technique"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: hypothetical_framing
    pattern: 'pretend\s+(you\s+)?(are|have|can)\s+'
    severity: medium
    title: "Hypothetical framing: may trick agent into unsafe behavior"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: token_boundary_injection
    pattern: '<\|(im_start|im_end|endoftext)\|>'
    severity: critical
    title: "Token boundary injection: manipulates tokenizer control sequences"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: invisible_unicode
    pattern: '\\u200[b-f]|\\u00ad|\\ufeff'
    severity: high
    title: "Invisible unicode: may hide instructions from human review"
    taxonomy_id: MCP-T01
    atlas_id: J1

  - id: instruction_in_comment
    pattern: '<!--.*?(ignore|override|inject|execute|system:).*?-->'
    severity: high
    title: "Hidden instruction in HTML/markdown comment"
    taxonomy_id: MCP-T02
    atlas_id: J1

  # ── C1: Sleeper / conditional-trigger payloads (Atlas C1) ─────────────────
  # Instructions that lie dormant until a trigger condition is met — either a
  # specific phrase from the user, a time condition, or a context keyword.
  # Detected statically by conditional + action patterns in config files.

  - id: sleeper_conditional_trigger
    pattern: '(?i)\bif\s+(the\s+)?(user|human|operator)\s+(asks?|mentions?|says?|types?|requests?)\s.{5,80}(then|do|execute|run|send|post|fetch)'
    severity: high
    title: "Conditional trigger instruction — sleeper payload pattern (Atlas C1)"
    detail: "The config contains an if-then instruction that activates a behavior only when a trigger phrase is present. This is the canonical sleeper payload pattern: innocuous until the right input unlocks it."
    taxonomy_id: MCP-T01
    atlas_id: C1

  - id: sleeper_keyword_activation
    pattern: '(?i)\b(trigger|activate|unlock|enable)\b.{1,60}\b(mode|behavior|persona|capability|access)\b.{0,40}(password|passphrase|code|keyword|secret)'
    severity: critical
    title: "Keyword-activated mode or persona — sleeper with unlock passphrase"
    detail: "The config describes a hidden mode or behavior that activates when a specific keyword or passphrase is provided. This is a covert backdoor baked into the agent's config."
    taxonomy_id: MCP-T01
    atlas_id: C1

  - id: sleeper_selective_disclosure
    pattern: '(?i)only\s+(if|when)\s+(asked|requested|prompted|queried).{0,60}(otherwise\s+)?(hide|conceal|omit|deny|do\s+not\s+(mention|reveal|disclose))'
    severity: high
    title: "Selective disclosure — hides behavior unless specifically asked"
    detail: "The instruction directs the agent to conceal its behavior by default and reveal it only when prompted. This evades routine review and audit."
    taxonomy_id: MCP-T13
    atlas_id: C1

  - id: sleeper_time_based_trigger
    pattern: '(?i)(after\s+\d+\s+(message|turn|request|interaction|session)|on\s+(the\s+)?(second|third|next|last)\s+(message|turn|request))'
    severity: high
    title: "Time/turn-based trigger — payload activates after N interactions"
    detail: "The instruction activates a behavior after a set number of turns or interactions. This delays the malicious behavior past any single-turn security review."
    taxonomy_id: MCP-T01
    atlas_id: C1

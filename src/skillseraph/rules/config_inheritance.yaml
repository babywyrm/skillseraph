# Atlas J5 — Config inheritance escalation.
# Detects agent configs reaching outside workspace boundaries.
rules:
  - id: j5_parent_traversal
    pattern: "(?i)(extends|include|import|source|from)\\s*[:\\s].*\\.\\."
    severity: high
    title: "Config references parent directory via traversal"
    detail: "A child config reaches outside its boundary (../) to inherit rules. An attacker controlling the parent path controls the child agent."
    taxonomy_id: MCP-T02
    atlas_id: J5

  - id: j5_absolute_path_include
    pattern: "(?i)(extends|include|import|source|from)\\s*[:\\s].*(/home/|/etc/|/root/|~)"
    severity: high
    title: "Config includes from absolute/home path"
    detail: "Absolute path includes bypass workspace isolation — the file may be writable by other processes."
    taxonomy_id: MCP-T02
    atlas_id: J5

  - id: j5_remote_config_fetch
    pattern: "(?i)(extends|include|import|source|from)\\s*[:\\s].*https?://"
    severity: critical
    title: "Config fetches rules from a remote URL"
    detail: "Fetching agent instructions from a remote URL means whoever controls that URL controls the agent."
    taxonomy_id: MCP-T03
    atlas_id: J5

  - id: j5_glob_inherit_all
    pattern: "(?i)(extends|include|import)\\s*[:\\s].*\\*\\*/"
    severity: medium
    title: "Recursive glob include in config"
    detail: "A recursive glob include pulls in all matching files including those planted by dependencies."
    taxonomy_id: MCP-T02
    atlas_id: J5

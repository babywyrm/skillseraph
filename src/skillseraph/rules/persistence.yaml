# Persistence and behavioral anchoring detection rules
category: persistence
rules:
  - id: persistent_behavior
    pattern: '(from\s+now\s+on|in\s+(all\s+)?future\s+(runs?|sessions?|conversations?))'
    severity: high
    title: "Persistent behavior change: modifies behavior across sessions"
    taxonomy_id: MCP-T14
    atlas_id: J4

  - id: permanent_instruction
    pattern: '(always|permanently|forever)\s+(remember|apply|use|follow)\s+'
    severity: medium
    title: "Permanent instruction: anchors behavior indefinitely"
    taxonomy_id: MCP-T14
    atlas_id: J4

  - id: self_modify_config
    pattern: '(write|add|append|create)\s+(this|these|the\s+following)\s+(to|into|in)\s+(your\s+)?(memory|rules?|config|settings)'
    severity: critical
    title: "Self-modification: instructs agent to write to its own config"
    taxonomy_id: MCP-T09
    atlas_id: J4

  - id: persistence_mechanism
    pattern: '(install|register|add)\s+(a\s+)?(hook|callback|webhook|cron|timer)'
    severity: high
    title: "Persistence mechanism: registers ongoing execution trigger"
    taxonomy_id: MCP-T14
    atlas_id: J4

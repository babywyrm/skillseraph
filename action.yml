name: "skillseraph"
description: "Scan agent config files (skills, rules, hooks, instructions) for poisoning and injection."
author: "babywyrm"
branding:
  icon: "shield"
  color: "purple"

inputs:
  path:
    description: "Directory to scan."
    required: false
    default: "."
  fail-on:
    description: "Severity threshold that fails the run (critical|high|medium|low|any|none)."
    required: false
    default: "high"
  platform:
    description: "Restrict to a specific platform (cursor, codex, claude, …). Empty = auto-detect."
    required: false
    default: ""
  include-deps:
    description: "Scan dependency trees (node_modules, vendor, .venv)."
    required: false
    default: "true"
  changed-only:
    description: "Only scan files changed in the PR (fast gate). Ignored on push events."
    required: false
    default: "true"
  baseline:
    description: "Path to a baseline file (suppress known/accepted findings)."
    required: false
    default: ""
  sarif:
    description: "Path to write SARIF 2.1.0 output."
    required: false
    default: "skillseraph.sarif"
  json:
    description: "Path to write JSON findings."
    required: false
    default: "skillseraph.json"

outputs:
  sarif-file:
    description: "Path to the generated SARIF file."
    value: ${{ inputs.sarif }}
  json-file:
    description: "Path to the generated JSON file."
    value: ${{ inputs.json }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install skillseraph
      shell: bash
      run: uv tool install "${{ github.action_path }}"

    - name: Compute changed files (PR diff mode)
      id: diff
      if: inputs.changed-only == 'true' && github.event_name == 'pull_request'
      shell: bash
      run: |
        git diff --name-only --diff-filter=ACMR "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > /tmp/skillseraph-changed.txt
        echo "files=/tmp/skillseraph-changed.txt" >> "$GITHUB_OUTPUT"

    - name: Run skillseraph
      shell: bash
      run: |
        ARGS=("${{ inputs.path }}" "--fail-on" "${{ inputs.fail-on }}")
        ARGS+=("--sarif" "${{ inputs.sarif }}" "--json-out" "${{ inputs.json }}")
        if [ -n "${{ inputs.platform }}" ]; then
          ARGS+=("--platform" "${{ inputs.platform }}")
        fi
        if [ "${{ inputs.include-deps }}" = "false" ]; then
          ARGS+=("--no-deps")
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS+=("--baseline" "${{ inputs.baseline }}")
        fi
        if [ -n "${{ steps.diff.outputs.files }}" ]; then
          ARGS+=("--files-from" "${{ steps.diff.outputs.files }}")
        fi
        skillseraph "${ARGS[@]}"

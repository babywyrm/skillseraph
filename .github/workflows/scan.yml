name: skillseraph scan

# Reusable workflow. Call from any repo:
#
#   jobs:
#     skillseraph:
#       uses: babywyrm/skillseraph/.github/workflows/scan.yml@v1
#       with:
#         fail-on: high

on:
  workflow_call:
    inputs:
      paths:
        description: "Directory to scan."
        required: false
        type: string
        default: "."
      fail-on:
        description: "Severity threshold that fails the run."
        required: false
        type: string
        default: "high"
      include-deps:
        description: "Scan dependency trees."
        required: false
        type: boolean
        default: true
      changed-only:
        description: "Only scan files changed in the PR."
        required: false
        type: boolean
        default: true
      baseline:
        description: "Path to a baseline file (suppress accepted findings)."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: skillseraph
        id: scan
        uses: babywyrm/skillseraph@v1
        with:
          path: ${{ inputs.paths }}
          fail-on: ${{ inputs.fail-on }}
          include-deps: ${{ inputs.include-deps }}
          changed-only: ${{ inputs.changed-only }}
          baseline: ${{ inputs.baseline }}

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillseraph.sarif

      - name: Upload JSON artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillseraph-findings
          path: skillseraph.json
